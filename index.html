<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Valorant Mobile - Mini 3D</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Arayüz Elemanları (HUD) */
        #hud {
            position: absolute;
            bottom: 20px;
            left: 20px;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
            pointer-events: none;
            z-index: 10;
        }

        #crosshair {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            transform: translate(-50%, -50%);
            pointer-events: none;
            z-index: 10;
        }
        #crosshair::before, #crosshair::after {
            content: '';
            position: absolute;
            background: #00ffcc;
        }
        #crosshair::before { top: 4px; left: -5px; width: 20px; height: 2px; }
        #crosshair::after { top: -5px; left: 4px; width: 2px; height: 20px; }

        /* Mobil Kontroller */
        .joystick-zone {
            position: absolute;
            bottom: 40px;
            width: 120px;
            height: 120px;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            z-index: 10;
        }
        #move-zone { left: 4px; } /* Sol el yürüme */
        
        #shoot-btn {
            position: absolute;
            bottom: 50px;
            right: 40px;
            width: 80px;
            height: 80px;
            background: radial-gradient(circle, #ff4655 40%, #b71c1c 100%);
            border: 3px solid #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #ff4655;
            z-index: 10;
            color: white;
            font-weight: bold;
            text-align: center;
            line-height: 74px;
            font-size: 18px;
        }

        /* Skor ve Bildirim */
        #score-board {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff4655;
            font-size: 28px;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 10;
            text-shadow: 0 0 10px rgba(255,70,85,0.5);
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <div id="score-board">SKOR: <span id="score">0</span></div>
    <div id="crosshair"></div>
    <div id="hud">HP: 100 | ŞARJÖR: <span id="ammo">30</span>/∞</div>

    <div id="move-zone" class="joystick-zone"></div>
    <div id="shoot-btn">ATEŞ</div>

    <script>
        // --- 3D SAHNE KURULUMU ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x11141a); // Valorant koyu tema arka planı
        scene.fog = new THREE.FogExp2(0x11141a, 0.05);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        // Işıklandırma
        const ambientLight = new THREE.AmbientLight(0xffffff, 0.6);
        scene.add(ambientLight);
        const dirLight = new THREE.DirectionalLight(0xff4655, 0.8);
        dirLight.position.set(10, 20, 10);
        scene.add(dirLight);

        // Harita/Zemin (Poligon desenli alan)
        const floorGeo = new THREE.PlaneGeometry(100, 100);
        const floorMat = new THREE.MeshStandardMaterial({ color: 0x1f2326, roughness: 0.8 });
        const floor = new THREE.Mesh(floorGeo, floorMat);
        floor.rotation.x = -Math.PI / 2;
        scene.add(floor);

        // --- SİLAH YAPIMI (Vandal Esintisi) ---
        const weaponGroup = new THREE.Group();
        
        // Silah gövdesi
        const bodyGeo = new THREE.BoxGeometry(0.1, 0.15, 0.6);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x2b2b2b, metalness: 0.8 });
        const gunBody = new THREE.Mesh(bodyGeo, bodyMat);
        weaponGroup.add(gunBody);

        // Silah namlusu
        const barrelGeo = new THREE.CylinderGeometry(0.02, 0.02, 0.4);
        const barrelMat = new THREE.MeshStandardMaterial({ color: 0x111, metalness: 0.9 });
        const barrel = new THREE.Mesh(barrelGeo, barrelMat);
        barrel.rotation.x = Math.PI / 2;
        barrel.position.set(0, 0.02, -0.4);
        weaponGroup.add(barrel);

        // Kamera arkasına sabitleme
        camera.add(weaponGroup);
        scene.add(camera);
        // Silahın ekrandaki duruş pozisyonu (Sağ alt köşe)
        weaponGroup.position.set(0.2, -0.2, -0.5); 

        // --- HEDEFLER (Düşman Botlar) ---
        let enemies = [];
        let score = 0;
        let ammo = 30;

        function spawnEnemy() {
            const enemyGeo = new THREE.BoxGeometry(1.5, 3, 1.5);
            const enemyMat = new THREE.MeshStandardMaterial({ color: 0xff4655, emissive: 0x3a0005 }); // Valorant Kırmızısı
            const enemy = new THREE.Mesh(enemyGeo, enemyMat);
            
            // Rastgele yerlere yerleştir
            enemy.position.x = (Math.random() - 0.5) * 40;
            enemy.position.z = -(Math.random() * 30 + 10);
            enemy.position.y = 1.5; // Zemine basma payı
            
            scene.add(enemy);
            enemies.push(enemy);
        }

        // Başlangıçta 5 tane düşman oluştur
        for(let i=0; i<5; i++) spawnEnemy();

        // --- MOBİL DOKUNMATİK VE BAKIŞ KONTROLLERİ ---
        let moveJoystick = { active: false, startX: 0, startY: 0, moveX: 0, moveY: 0 };
        let lookJoystick = { touchId: null, lastX: 0, lastY: 0 };
        
        let moveForward = 0;
        let moveSideways = 0;
        let yaw = 0;
        let pitch = 0;

        // Ekranın sol tarafı yürüme, sağ tarafı bakış algılasın
        window.addEventListener('touchstart', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                
                if (touch.clientX < window.innerWidth / 2) {
                    // Sol Taraf - Yürüme
                    moveJoystick.active = true;
                    moveJoystick.startX = touch.clientX;
                    moveJoystick.startY = touch.clientY;
                } else {
                    // Sağ Taraf - Bakış (Ateş butonuna basılmadıysa)
                    if (touch.target.id !== 'shoot-btn') {
                        lookJoystick.touchId = touch.identifier;
                        lookJoystick.lastX = touch.clientX;
                        lookJoystick.lastY = touch.clientY;
                    }
                }
            }
        }, { passive: false });

        window.addEventListener('touchmove', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                
                if (moveJoystick.active && touch.clientX < window.innerWidth / 2) {
                    moveJoystick.moveX = touch.clientX - moveJoystick.startX;
                    moveJoystick.moveY = touch.clientY - moveJoystick.startY;
                    
                    // Gücü sınırla
                    moveForward = -moveJoystick.moveY / 50;
                    moveSideways = moveJoystick.moveX / 50;
                } 
                
                if (touch.identifier === lookJoystick.touchId) {
                    let deltaX = touch.clientX - lookJoystick.lastX;
                    let deltaY = touch.clientY - lookJoystick.lastY;
                    
                    yaw -= deltaX * 0.005;
                    pitch -= deltaY * 0.005;
                    pitch = Math.max(-Math.PI/3, Math.min(Math.PI/3, pitch)); // Yukarı aşağı sınır
                    
                    lookJoystick.lastX = touch.clientX;
                    lookJoystick.lastY = touch.clientY;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', (e) => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                let touch = e.changedTouches[i];
                if (touch.clientX < window.innerWidth / 2) {
                    moveJoystick.active = false;
                    moveForward = 0;
                    moveSideways = 0;
                }
                if (touch.identifier === lookJoystick.touchId) {
                    lookJoystick.touchId = null;
                }
            }
        });

        // --- ATEŞ ETME MEKANİĞİ (Raycasting) ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2(0, 0); // Ekranın tam ortası (Nişangah)

        const shootBtn = document.getElementById('shoot-btn');
        shootBtn.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (ammo <= 0) {
                document.getElementById('ammo').innerText = "DOLDURULUYOR...";
                setTimeout(() => { ammo = 30; document.getElementById('ammo').innerText = ammo; }, 1500);
                return;
            }

            ammo--;
            document.getElementById('ammo').innerText = ammo;

            // Ateş tepme efekti (Vandal recoil)
            weaponGroup.position.z = -0.4;
            setTimeout(() => weaponGroup.position.z = -0.5, 50);

            // Merkezden ışın gönder (Tam nişangahın vurduğu yer)
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(enemies);

            if (intersects.length > 0) {
                let hitEnemy = intersects[0].object;
                
                // Düşmanı yok et ve yenisini çıkar
                scene.remove(hitEnemy);
                enemies = enemies.filter(e => e !== hitEnemy);
                
                score += 100;
                document.getElementById('score').innerText = score;
                
                spawnEnemy();
            }
        });

        // --- OYUN DÖNGÜSÜ (GÜNCELLEME) ---
        camera.position.y = 2; // Oyuncu boy hizası

        function animate() {
            requestAnimationFrame(animate);

            // Bakış yönünü güncelle
            camera.quaternion.setFromEuler(new THREE.Euler(pitch, yaw, 0, 'YXZ'));

            // Hareketi bakış yönüne göre uyarla
            const forward = new THREE.Vector3(0, 0, -1).applyQuaternion(camera.quaternion);
            forward.y = 0; forward.normalize();
            const sideways = new THREE.Vector3(1, 0, 0).applyQuaternion(camera.quaternion);
            sideways.y = 0; sideways.normalize();

            // Sınırlandırılmış hız
            let speed = 0.1;
            camera.position.addScaledVector(forward, Math.max(-0.1, Math.min(0.1, moveForward)) * speed);
            camera.position.addScaledVector(sideways, Math.max(-0.1, Math.min(0.1, moveSideways)) * speed);

            // Harita dışına taşmayı engelle
            camera.position.x = Math.max(-45, Math.min(45, camera.position.x));
            camera.position.z = Math.max(-45, Math.min(45, camera.position.z));

            renderer.render(scene, camera);
        }

        // Ekran boyutu değişirse ayarla
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
